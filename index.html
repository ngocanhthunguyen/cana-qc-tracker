<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANA QC Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<header>
  <div class="titlebar">
    <div class="brand">
      <h1>CANA QC Tracker <span>Main dashboard · all farms · monthly exports · blue = manager, purple = QC</span></h1>
    </div>
    <div class="toolbar">
      <span class="conn-pill off" id="connPill">Not linked</span>
      <button id="btnLinkSheet" class="primary" title="Connect to shared Google Sheet for real-time team sync">📗 Google Sheet <span class="bi">/ เชื่อมชีต</span></button>
      <button id="btnReconnect" style="display:none;" title="Re-grant access to the previously linked file"></button>
      <button id="btnSaveFile" title="Save now">💾 Save <span class="bi">/ บันทึก</span></button>
      <button id="btnReload" title="Pull latest data now">🔄 Reload</button>
      <button id="btnOpenSheet" style="display:none;" class="hide-sm" title="Open Google Sheet in browser">↗ Open Sheet</button>
      <div class="more-menu" id="moreMenu">
        <button id="btnMore" type="button">⋯ More</button>
        <div class="dropdown">
          <button id="btnOpenFileMob" type="button">🔗 Link Excel File</button>
          <button id="btnSetupGuide" type="button">📖 Google Sheet Setup</button>
          <button id="btnExportJSON" type="button">⬇ Export JSON</button>
          <button id="btnImportJSON" type="button">⬆ Import JSON</button>
          <button id="btnExportExcel" type="button">📊 Export Excel Copy</button>
        </div>
      </div>
      <input type="file" id="fileImportInput" accept="application/json">
      <input type="file" id="docUploadInput" multiple accept="*/*" style="display:none">
    </div>
  </div>
</header>

<nav class="tabs" id="tabsNav"></nav>

<main id="mainArea"></main>

<div id="modalRoot"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
